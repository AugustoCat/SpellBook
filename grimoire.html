<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grimoire — Spellbook Creator</title>
  <link rel="stylesheet" href="grimoire.css">
  <link rel="stylesheet" href="themes/themes.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=MedievalSharp&family=Uncial+Antiqua&family=Pirata+One&family=Almendra:ital,wght@0,400;0,700;1,400&family=IM+Fell+English+SC&family=Spectral:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="theme-medieval">

  <div id="toolbar" class="no-print">
    <a href="index.html" class="toolbar-back">← Back</a>
    <div class="toolbar-controls">
      <label>Size:
        <select id="page-size">
          <option value="a4" selected>A4</option>
          <option value="a5">A5</option>
          <option value="letter">Letter</option>
          <option value="legal">Legal</option>
        </select>
      </label>
      <label>Theme:
        <select id="theme-select">
          <option value="medieval">Classic Medieval</option>
          <option value="elfico">Elvish</option>
          <option value="runico">Runic</option>
          <option value="dragao">Dragon</option>
          <option value="arcano">Arcane</option>
          <option value="simples">Simple</option>
          <option value="necronomicon">Necronomicon</option>
          <option value="scroll">Scroll</option>
          <option value="spellcard">Spellcard</option>
          <option value="codex">Ancient Codex</option>
        </select>
      </label>
      <label class="toolbar-checkbox">
        <input type="checkbox" id="toggle-transparent">
        No background
      </label>
      <button id="btn-customize" class="toolbar-btn" title="Customize appearance">⚙ Customize</button>
      <button id="btn-pdf" class="toolbar-btn" title="Download as PDF">📄 PDF</button>
      <button id="btn-print" class="toolbar-btn">🖨 Print</button>
    </div>
  </div>

  <div id="customize-modal" class="modal-overlay hidden">
    <div class="modal-content modal-wide">
      <button class="modal-close">&times;</button>
      <h2>Customize Appearance</h2>
      <div class="customize-grid">
        <div class="customize-group">
          <label for="cust-bg-color">Background Color</label>
          <input type="color" id="cust-bg-color" value="#1a1a2e">
        </div>
        <div class="customize-group">
          <label for="cust-text-color">Text Color</label>
          <input type="color" id="cust-text-color" value="#e0d8c8">
        </div>
        <div class="customize-group">
          <label for="cust-accent-color">Accent Color</label>
          <input type="color" id="cust-accent-color" value="#c9a84c">
        </div>
        <div class="customize-group">
          <label for="cust-card-bg">Card Background</label>
          <input type="color" id="cust-card-bg" value="#2a2a3e">
        </div>
        <div class="customize-group">
          <label for="cust-border-color">Border Color</label>
          <input type="color" id="cust-border-color" value="#c9a84c">
        </div>
        <div class="customize-group">
          <label for="cust-header-bg">Header Background</label>
          <input type="color" id="cust-header-bg" value="#0d0d1a">
        </div>
        <div class="customize-group">
          <label for="cust-font-title">Title Font</label>
          <select id="cust-font-title">
            <option value="'Cinzel', serif">Cinzel</option>
            <option value="'MedievalSharp', cursive">MedievalSharp</option>
            <option value="'Uncial Antiqua', system-ui">Uncial Antiqua</option>
            <option value="'Pirata One', system-ui">Pirata One</option>
            <option value="'Almendra', serif">Almendra</option>
            <option value="'IM Fell English SC', serif">IM Fell English SC</option>
            <option value="'Inter', sans-serif">Inter</option>
          </select>
        </div>
        <div class="customize-group">
          <label for="cust-font-body">Body Font</label>
          <select id="cust-font-body">
            <option value="'Crimson Text', serif">Crimson Text</option>
            <option value="'Spectral', serif">Spectral</option>
            <option value="'Almendra', serif">Almendra</option>
            <option value="'Inter', sans-serif">Inter</option>
            <option value="Georgia, serif">Georgia</option>
          </select>
        </div>
        <div class="customize-group">
          <label for="cust-font-size">Base Size (px)</label>
          <input type="number" id="cust-font-size" value="15" min="10" max="24">
        </div>
        <div class="customize-group">
          <label for="cust-border-radius">Border Radius (px)</label>
          <input type="number" id="cust-border-radius" value="6" min="0" max="30">
        </div>
        <div class="customize-group">
          <label for="cust-border-width">Border Width (px)</label>
          <input type="number" id="cust-border-width" value="1" min="0" max="6">
        </div>
        <div class="customize-group">
          <label for="cust-card-shadow">Card Shadow</label>
          <select id="cust-card-shadow">
            <option value="none">None</option>
            <option value="0 2px 8px rgba(0,0,0,0.3)">Light</option>
            <option value="0 4px 16px rgba(0,0,0,0.5)" selected>Medium</option>
            <option value="0 8px 32px rgba(0,0,0,0.7)">Strong</option>
          </select>
        </div>
      </div>
      <div class="customize-actions">
        <button id="cust-apply" class="btn-primary">Apply</button>
        <button id="cust-reset" class="btn-secondary">Reset to Theme</button>
      </div>
    </div>
  </div>

  <div id="grimoire-loading">
    <div class="loading-spinner"></div>
    <p>Preparing grimoire...</p>
  </div>

  <div id="pages-container"></div>

  <div id="zoom-controls" class="no-print">
    <button id="zoom-out" title="Zoom out">−</button>
    <span id="zoom-level">100%</span>
    <button id="zoom-in" title="Zoom in">+</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="grimoire.js"></script>
</body>
</html>
