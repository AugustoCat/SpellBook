<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spellbook Creator — D&D 5e</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="themes/themes.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=MedievalSharp&family=Uncial+Antiqua&family=Pirata+One&family=Almendra:ital,wght@0,400;0,700;1,400&family=IM+Fell+English+SC&family=Spectral:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="theme-medieval">
  <div id="loading-overlay">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p>Loading spells...</p>
    </div>
  </div>

  <header id="app-header">
    <div class="header-left">
      <h1 class="app-title">✦ Spellbook Creator</h1>
      <span class="app-subtitle">D&D 5th Edition</span>
    </div>
    <div class="header-right">
      <div class="theme-selector">
        <label for="theme-select">Theme:</label>
        <select id="theme-select">
          <option value="medieval">Classic Medieval</option>
          <option value="elfico">Elvish</option>
          <option value="runico">Runic</option>
          <option value="dragao">Dragon</option>
          <option value="arcano">Arcane</option>
          <option value="simples">Simple</option>
          <option value="necronomicon">Necronomicon</option>
          <option value="scroll">Scroll</option>
          <option value="spellcard">Spellcard</option>
          <option value="codex">Ancient Codex</option>
        </select>
      </div>
      <button id="btn-customize" class="btn-icon" title="Customize appearance">⚙</button>
      <button id="btn-export-theme" class="btn-icon" title="Export theme">📤</button>
      <button id="btn-import-theme" class="btn-icon" title="Import theme">📥</button>
      <input type="file" id="import-theme-file" accept=".json" hidden>
    </div>
  </header>

  <main id="app-main">
    <div id="mobile-overlay" class="mobile-overlay hidden"></div>
    <aside id="filters-panel">
      <div class="panel-header-mobile">
        <h2 class="panel-title">Filters</h2>
        <button id="btn-close-filters" class="btn-icon mobile-only" title="Close">&times;</button>
      </div>

      <div class="filter-group">
        <label for="filter-name">Name</label>
        <input type="text" id="filter-name" placeholder="Search spell...">
      </div>

      <div class="filter-group">
        <label>Class</label>
        <div id="filter-class" class="filter-chips"></div>
      </div>

      <div class="filter-group">
        <label>Level</label>
        <div id="filter-level" class="filter-chips">
          <button class="chip" data-value="0">Cantrip</button>
          <button class="chip" data-value="1">1</button>
          <button class="chip" data-value="2">2</button>
          <button class="chip" data-value="3">3</button>
          <button class="chip" data-value="4">4</button>
          <button class="chip" data-value="5">5</button>
          <button class="chip" data-value="6">6</button>
          <button class="chip" data-value="7">7</button>
          <button class="chip" data-value="8">8</button>
          <button class="chip" data-value="9">9</button>
        </div>
      </div>

      <div class="filter-group">
        <label>School</label>
        <div id="filter-school" class="filter-chips"></div>
      </div>

      <div class="filter-group">
        <label>Source</label>
        <div class="source-quick-filters">
          <button class="chip source-quick" data-sources="XPHB">PHB (2024)</button>
          <button class="chip source-quick" data-sources="TCE">TCE</button>
          <button class="chip source-quick" data-sources="XPHB,TCE">Both</button>
        </div>
        <button id="btn-open-sources" class="btn-secondary source-filter-btn">Sources (0/0)</button>
      </div>

      <div class="filter-actions">
        <button id="btn-clear-filters" class="btn-secondary">Clear Filters</button>
      </div>

      <div class="filter-group" style="margin-top:1rem;">
        <label>Spellbook</label>
        <div class="spellbook-actions">
          <button id="btn-save-spellbook" class="btn-secondary" title="Save spellbook to browser">💾 Save</button>
          <button id="btn-load-spellbook" class="btn-secondary" title="Load saved spellbook">📂 Load</button>
          <button id="btn-clear-spellbook" class="btn-secondary btn-danger" title="Clear spellbook">🗑 Clear</button>
        </div>
        <div class="spellbook-actions" style="margin-top:0.4rem;">
          <button id="btn-export-spellbook" class="btn-secondary" title="Export spellbook as JSON file">📤 Export</button>
          <button id="btn-import-spellbook" class="btn-secondary" title="Import spellbook from JSON file">📥 Import</button>
          <input type="file" id="import-spellbook-file" accept=".json" hidden>
        </div>
      </div>
    </aside>

    <section id="spells-list-panel">
      <div class="panel-header">
        <button id="btn-mobile-filters" class="btn-icon mobile-only" title="Filters">🔍</button>
        <h2 class="panel-title">Spells <span id="spells-count" class="badge">0</span></h2>
        <div class="view-toggle ">
          <button id="view-grid" class="btn-icon active" title="Grid">▦</button>
          <button id="view-list" class="btn-icon" title="List">☰</button>
        </div>
        <button id="btn-mobile-spellbook" class="btn-icon mobile-only" title="Spellbook">📖</button>
      </div>
      <div id="spells-container" class="spells-grid"></div>
    </section>

    <section id="spellbook-panel">
      <div class="panel-header">
        <h2 class="panel-title">My Spellbook <span id="book-count" class="badge">0</span></h2>
        <button id="btn-view-grimoire" class="btn-primary" title="View spellbook as printable pages">📖 View</button>
        <button id="btn-close-spellbook" class="btn-icon mobile-only" title="Close">&times;</button>
      </div>
      <div id="spellbook-container"></div>
    </section>
  </main>

  <div id="spell-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="customize-modal" class="modal-overlay hidden">
    <div class="modal-content modal-wide">
      <button class="modal-close">&times;</button>
      <h2>Customize Appearance</h2>
      <div class="customize-grid">
        <div class="customize-group">
          <label for="cust-bg-color">Background Color</label>
          <input type="color" id="cust-bg-color" value="#1a1a2e">
        </div>
        <div class="customize-group">
          <label for="cust-text-color">Text Color</label>
          <input type="color" id="cust-text-color" value="#e0d8c8">
        </div>
        <div class="customize-group">
          <label for="cust-accent-color">Accent Color</label>
          <input type="color" id="cust-accent-color" value="#c9a84c">
        </div>
        <div class="customize-group">
          <label for="cust-card-bg">Card Background</label>
          <input type="color" id="cust-card-bg" value="#2a2a3e">
        </div>
        <div class="customize-group">
          <label for="cust-border-color">Border Color</label>
          <input type="color" id="cust-border-color" value="#c9a84c">
        </div>
        <div class="customize-group">
          <label for="cust-header-bg">Header Background</label>
          <input type="color" id="cust-header-bg" value="#0d0d1a">
        </div>
        <div class="customize-group">
          <label for="cust-font-title">Title Font</label>
          <select id="cust-font-title">
            <option value="'Cinzel', serif">Cinzel</option>
            <option value="'MedievalSharp', cursive">MedievalSharp</option>
            <option value="'Uncial Antiqua', system-ui">Uncial Antiqua</option>
            <option value="'Pirata One', system-ui">Pirata One</option>
            <option value="'Almendra', serif">Almendra</option>
            <option value="'IM Fell English SC', serif">IM Fell English SC</option>
            <option value="'Inter', sans-serif">Inter</option>
          </select>
        </div>
        <div class="customize-group">
          <label for="cust-font-body">Body Font</label>
          <select id="cust-font-body">
            <option value="'Crimson Text', serif">Crimson Text</option>
            <option value="'Spectral', serif">Spectral</option>
            <option value="'Almendra', serif">Almendra</option>
            <option value="'Inter', sans-serif">Inter</option>
            <option value="Georgia, serif">Georgia</option>
          </select>
        </div>
        <div class="customize-group">
          <label for="cust-font-size">Base Size (px)</label>
          <input type="number" id="cust-font-size" value="15" min="10" max="24">
        </div>
        <div class="customize-group">
          <label for="cust-border-radius">Border Radius (px)</label>
          <input type="number" id="cust-border-radius" value="6" min="0" max="30">
        </div>
        <div class="customize-group">
          <label for="cust-border-width">Border Width (px)</label>
          <input type="number" id="cust-border-width" value="1" min="0" max="6">
        </div>
        <div class="customize-group">
          <label for="cust-card-shadow">Card Shadow</label>
          <select id="cust-card-shadow">
            <option value="none">None</option>
            <option value="0 2px 8px rgba(0,0,0,0.3)">Light</option>
            <option value="0 4px 16px rgba(0,0,0,0.5)" selected>Medium</option>
            <option value="0 8px 32px rgba(0,0,0,0.7)">Strong</option>
          </select>
        </div>
      </div>
      <div class="customize-actions">
        <button id="cust-apply" class="btn-primary">Apply</button>
        <button id="cust-reset" class="btn-secondary">Reset to Theme</button>
      </div>
    </div>
  </div>

  <div id="sources-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <h2>Filter by Source</h2>
      <div class="sources-modal-actions">
        <button id="sources-select-all" class="btn-secondary">Select All</button>
        <button id="sources-deselect-all" class="btn-secondary">Deselect All</button>
      </div>
      <div id="sources-list" class="sources-checklist"></div>
      <div class="sources-modal-footer">
        <button id="sources-apply" class="btn-primary">Apply</button>
      </div>
    </div>
  </div>

  <div id="saved-spellbooks-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <h2>Saved Spellbooks</h2>
      <div id="saved-list"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
